<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.imgur.com/8N4X0Uf.png">
    <title>SchoolBase Pro</title>
    <style>
        :root { --bg: #000000; --card: #111111; --text: #ffffff; --border: #222222; --primary: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .auth-box { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 12px; text-align: center; }
        #app-content { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .tabs { display: flex; gap: 6px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: #888; font-weight: bold; font-size: 11px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .view { display: none; } .view.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-bottom: 20px; }
        input, select { background: #1a1a1a; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-small { background: none; border: 1px solid var(--border); color: #888; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .item { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .day-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 1px solid #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; z-index: 3000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2500; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <img src="https://i.imgur.com/8N4X0Uf.png" style="width:80px; margin-bottom:20px; border-radius:20px;">
        <div class="auth-box">
            <h1 style="letter-spacing:-1px;">SchoolBase</h1>
            <input type="text" id="username" placeholder="Name">
            <input type="password" id="password" placeholder="Passwort">
            <button class="btn" onclick="login()">STARTEN</button>
        </div>
    </div>

    <div id="app-content">
        <div class="header">
            <div>
                <div id="display-user" style="font-size:10px; color:#666; text-transform:uppercase;">User</div>
                <h2 style="margin:0; letter-spacing:-1px;">SchoolBase</h2>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn-small" onclick="openAdmin()">GEAR</button>
                <button class="btn-small" onclick="location.reload()">LOGOUT</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showView('hw-view', this)">Hausaufgaben</button>
            <button class="tab-btn" onclick="showView('ex-view', this)">Arbeiten</button>
            <button class="tab-btn" onclick="showView('plan-view', this)">Plan</button>
        </div>

        <div id="hw-view" class="view active">
            <div class="card">
                <input type="text" id="hw-task" placeholder="Was ist zu tun?">
                <select id="hw-sub" class="sub-select"></select>
                <button class="btn" onclick="add('hw')">Hinzufügen</button>
            </div>
            <div id="hw-list"></div>
        </div>

        <div id="ex-view" class="view">
            <div class="card">
                <input type="text" id="ex-name" placeholder="Thema">
                <input type="date" id="ex-date">
                <select id="ex-sub" class="sub-select"></select>
                <button class="btn" onclick="add('ex')">Speichern</button>
            </div>
            <div id="ex-list"></div>
        </div>

        <div id="plan-view" class="view">
            <div id="plan-list"></div>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAdmin()"></div>
    <div id="admin-modal" class="modal">
        <h3 style="margin-top:0">Einstellungen</h3>
        <p style="font-size:11px; color:#666;">Fächer (mit Komma trennen):</p>
        <input type="text" id="edit-subs">
        <p style="font-size:11px; color:#666; margin-top:15px;">Plan (Mo-Fr):</p>
        <div id="plan-edit-fields" style="max-height:200px; overflow-y:auto;"></div>
        <button class="btn" style="margin-top:20px;" onclick="saveAdmin()">SPEICHERN</button>
    </div>

<script>
    let currentUser = "";
    let db = {};

    function login() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Login fehlt!");
        currentUser = u;
        document.getElementById('display-user').innerText = u;
        const saved = localStorage.getItem('sb_pro_' + u);
        db = saved ? JSON.parse(saved) : {
            hw: [], ex: [], 
            subs: ["Mathe", "Deutsch", "Englisch"],
            plan: { "Montag": "", "Dienstag": "", "Mittwoch": "", "Donnerstag": "", "Freitag": "" }
        };
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        render();
    }

    function showView(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function render() {
        document.querySelectorAll('.sub-select').forEach(s => {
            s.innerHTML = db.subs.map(sub => `<option>${sub}</option>`).join('');
        });
        document.getElementById('hw-list').innerHTML = db.hw.map(h => `<div class="item"><div><div style="font-size:10px; color:#666;">${h.sub}</div>${h.txt}</div><button class="btn-small" onclick="del('hw',${h.id})">×</button></div>`).join('');
        document.getElementById('ex-list').innerHTML = (db.ex || []).map(e => `<div class="item"><div><div style="font-size:10px; color:#666;">${e.sub}</div>${e.txt} <small>(${e.date})</small></div><button class="btn-small" onclick="del('ex',${e.id})">×</button></div>`).join('');
        
        const days = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const today = days[new Date().getDay()];
        document.getElementById('plan-list').innerHTML = Object.keys(db.plan).map(d => `
            <div class="day-box" style="${d === today ? 'border-color:#555;' : ''}">
                <div style="font-weight:bold; margin-bottom:10px;">${d} ${d === today ? '•' : ''}</div>
                ${db.plan[d] ? db.plan[d].split(',').map((s,i) => `<div style="font-size:13px; color:#888; padding:4px 0;">${i+1}. Std: <b style="color:#fff;">${s.trim()}</b></div>`).join('') : '<div style="font-size:12px; color:#444;">Noch kein Plan eingetragen.</div>'}
            </div>
        `).join('');
    }

    function add(type) {
        if(type === 'hw') {
            const txt = document.getElementById('hw-task').value;
            if(!txt) return;
            db.hw.unshift({id: Date.now(), txt, sub: document.getElementById('hw-sub').value});
            document.getElementById('hw-task').value = "";
        } else {
            const txt = document.getElementById('ex-name').value;
            const date = document.getElementById('ex-date').value;
            if(!txt || !date) return;
            if(!db.ex) db.ex = [];
            db.ex.push({id: Date.now(), txt, date, sub: document.getElementById('ex-sub').value});
        }
        save(); render();
    }

    function del(type, id) {
        db[type] = db[type].filter(i => i.id !== id);
        save(); render();
    }

    function openAdmin() {
        const pass = prompt("Passwort?");
        if(pass !== "1234") return alert("Falsch!");
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('admin-modal').style.display = 'block';
        document.getElementById('edit-subs').value = db.subs.join(', ');
        document.getElementById('plan-edit-fields').innerHTML = Object.keys(db.plan).map(d => `
            <div style="margin-bottom:10px;">${d}<input type="text" id="p-${d}" value="${db.plan[d]}" style="margin-bottom:0;"></div>
        `).join('');
    }

    function saveAdmin() {
        db.subs = document.getElementById('edit-subs').value.split(',').map(s => s.trim()).filter(s => s !== "");
        Object.keys(db.plan).forEach(d => { db.plan[d] = document.getElementById('p-'+d).value; });
        save(); render(); closeAdmin();
    }

    function save() { localStorage.setItem('sb_pro_' + currentUser, JSON.stringify(db)); }
    function closeAdmin() { document.getElementById('overlay').style.display = 'none'; document.getElementById('admin-modal').style.display = 'none'; }
</script>
</body>
</html>
