<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>School Manager Ultra Pro</title>
    <style>
        :root { 
            --primary: #6c5ce7; --bg: #f0f2f5; --card-bg: #ffffff; 
            --text: #2d3436; --accent: #00b894; --border: #dfe6e9;
            --grade-1: #00b894; --grade-3: #fdcb6e; --grade-5: #ff7675;
        }

        .dark-mode { 
            --bg: #1a1a2e; --card-bg: #16213e; --text: #e1e1e1; 
            --border: #313a52; --primary: #a29bfe;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }

        /* Top Bar & Tabs */
        .top-bar { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 600px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; background: var(--card-bg); color: var(--text); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .container { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        .view { display: none; }
        .view.active { display: block; }

        /* Inputs & Buttons */
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 2px solid var(--border); border-radius: 12px; background: var(--card-bg); color: var(--text); outline: none; box-sizing: border-box; width: 100%; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add:hover { opacity: 0.9; transform: scale(0.98); }

        /* List Items */
        .item { background: rgba(0,0,0,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .dark-mode .item { background: rgba(255,255,255,0.03); }
        .grade-badge { padding: 6px 14px; border-radius: 10px; color: white; font-weight: bold; }
        .g-good { background: var(--grade-1); } .g-ok { background: var(--grade-3); color: #2d3436; } .g-bad { background: var(--grade-5); }

        /* Admin Modal FIX */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--card-bg); z-index: 100; padding: 30px; border-radius: 24px; 
            width: 90%; max-width: 500px; box-shadow: 0 25px 80px rgba(0,0,0,0.5); color: var(--text);
            max-height: 85vh; overflow-y: auto; box-sizing: border-box;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 90; backdrop-filter: blur(8px); }
        .admin-sec { background: rgba(0,0,0,0.04); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .dark-mode .admin-sec { background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="tab-btn" style="flex: 0; padding: 10px 15px;" onclick="toggleDarkMode()">🌓 Mode</button>
        <button class="tab-btn" style="flex: 0; padding: 10px 15px; background: #2d3436; color: white;" onclick="openAdmin()">⚙️ Admin</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-hw" onclick="showView('hw-view', this)">📚 Hausaufgaben</button>
        <button class="tab-btn" onclick="showView('exam-view', this)">📝 Arbeiten</button>
        <button class="tab-btn" onclick="showView('grade-view', this)">⭐ Noten</button>
    </div>

    <div class="container">
        <div id="hw-view" class="view active">
            <h2>Hausaufgaben</h2>
            <div class="input-group">
                <input type="text" id="hw-task" placeholder="Was ist zu tun?">
                <select id="hw-sub"><option>Mathe</option><option>Deutsch</option><option>Englisch</option><option>Physik</option></select>
                <button class="btn-add" onclick="addItem('hw')">Hinzufügen</button>
            </div>
            <div id="hw-list"></div>
        </div>

        <div id="exam-view" class="view">
            <h2>Klassenarbeiten</h2>
            <div class="input-group">
                <input type="text" id="exam-name" placeholder="Thema">
                <input type="date" id="exam-date">
                <select id="exam-sub"><option>Mathe</option><option>Deutsch</option><option>Englisch</option></select>
                <button class="btn-add" onclick="addItem('exam')">Speichern</button>
            </div>
            <div id="exam-list"></div>
        </div>

        <div id="grade-view" class="view">
            <h2>Noten</h2>
            <div class="input-group">
                <input type="number" id="grade-val" placeholder="Note (1-6)" min="1" max="6">
                <select id="grade-sub"><option>Mathe</option><option>Deutsch</option><option>Englisch</option></select>
                <button class="btn-add" onclick="addItem('grade')">Eintragen</button>
            </div>
            <div id="avg-display" style="font-weight: bold; margin-bottom: 15px; color: var(--primary); text-align: center; font-size: 18px;">Schnitt: --</div>
            <div id="grade-list"></div>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAdmin()"></div>
    <div id="admin-panel" class="modal">
        <h2 style="margin-top:0">System Control ⚙️</h2>
        
        <div class="admin-sec">
            <strong>📊 Statistik</strong>
            <p id="admin-stats" style="font-size: 14px; margin: 10px 0;"></p>
        </div>

        <div class="admin-sec">
            <strong>💾 Datensicherung</strong>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="exportData()" class="btn-add" style="flex:1; background:#00b894; font-size:12px;">Backup Kopieren</button>
                <button onclick="importData()" class="btn-add" style="flex:1; background:#e17055; font-size:12px;">Importieren</button>
            </div>
        </div>

        <button class="btn-add" style="background:#ff7675; width:100%" onclick="if(confirm('ALLES LÖSCHEN?')){localStorage.clear(); location.reload();}">⚠️ Datenbank leeren</button>
        <button onclick="closeAdmin()" style="width:100%; margin-top:15px; background:none; border:none; color:#888; cursor:pointer; font-weight:bold;">Schließen</button>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('school_db_v3') || '{"hw":[], "exams":[], "grades":[]}');

    function showView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        btn.classList.add('active');
    }

    function addItem(type) {
        if(type === 'hw') {
            const t = document.getElementById('hw-task').value;
            if(!t) return;
            db.hw.unshift({id: Date.now(), text: t, sub: document.getElementById('hw-sub').value});
        } else if(type === 'exam') {
            const n = document.getElementById('exam-name').value;
            const d = document.getElementById('exam-date').value;
            if(!n || !d) return;
            db.exams.push({id: Date.now(), text: n, date: d, sub: document.getElementById('exam-sub').value});
        } else if(type === 'grade') {
            const g = document.getElementById('grade-val').value;
            if(!g || g < 1 || g > 6) return;
            db.grades.push({id: Date.now(), val: parseFloat(g), sub: document.getElementById('grade-sub').value});
        }
        save(); renderAll();
    }

    function renderAll() {
        document.getElementById('hw-list').innerHTML = db.hw.map(i => `<div class="item"><span><b>${i.sub}:</b> ${i.text}</span><span onclick="remove('hw', ${i.id})" style="cursor:pointer">🗑️</span></div>`).join('');
        document.getElementById('exam-list').innerHTML = db.exams.map(i => `<div class="item"><div><b>${i.sub}</b><br><small>${i.date} - ${i.text}</small></div><span onclick="remove('exams', ${i.id})" style="cursor:pointer">🗑️</span></div>`).join('');
        
        document.getElementById('grade-list').innerHTML = db.grades.map(i => {
            let c = i.val <= 2.0 ? 'g-good' : (i.val <= 4.0 ? 'g-ok' : 'g-bad');
            return `<div class="item"><span>${i.sub}</span><div style="display:flex; align-items:center; gap:10px;"><span class="grade-badge ${c}">${i.val}</span><span onclick="remove('grades', ${i.id})" style="cursor:pointer">🗑️</span></div></div>`;
        }).join('');

        if(db.grades.length > 0) {
            const avg = (db.grades.reduce((a, b) => a + b.val, 0) / db.grades.length).toFixed(2);
            document.getElementById('avg-display').innerText = `Dein Schnitt: ${avg}`;
        }
    }

    function remove(type, id) { db[type] = db[type].filter(i => i.id !== id); save(); renderAll(); }
    function save() { localStorage.setItem('school_db_v3', JSON.stringify(db)); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    function openAdmin() {
        if(prompt("Passwort?") === "AdminPanelPasswort123!") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('admin-stats').innerText = `Statistik: ${db.hw.length} Aufgaben, ${db.exams.length} Arbeiten, ${db.grades.length} Noten gelistet.`;
        }
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function exportData() { navigator.clipboard.writeText(JSON.stringify(db)); alert("Backup in Zwischenablage!"); }
    function importData() { const i = prompt("Backup einfügen:"); if(i) { db = JSON.parse(i); save(); location.reload(); } }

    renderAll();
</script>
</body>
</html>
