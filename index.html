<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SchoolBase Ultra</title>
    <style>
        :root { 
            --primary: #6c5ce7; --bg: #f0f2f5; --card-bg: #ffffff; 
            --text: #2d3436; --border: #dfe6e9; --accent: #00b894;
            --grade-1: #00b894; --grade-3: #fdcb6e; --grade-5: #ff7675;
        }

        .dark-mode { 
            --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; 
            --border: #334155; --primary: #818cf8;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); 
            color: var(--text); transition: 0.3s; display: flex; 
            flex-direction: column; align-items: center; padding: 20px; margin: 0; 
            min-height: 100vh;
        }

        /* Responsive Container */
        .container { 
            background: var(--card-bg); padding: 25px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; 
            max-width: 500px; box-sizing: border-box;
        }

        /* Top Bar & UI */
        .top-bar { width: 100%; max-width: 500px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 500px; }
        
        .tab-btn { 
            flex: 1; padding: 12px 5px; border-radius: 14px; border: none; 
            cursor: pointer; background: var(--card-bg); color: var(--text); 
            font-weight: bold; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .view { display: none; }
        .view.active { display: block; }

        /* Inputs */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select { 
            padding: 14px; border: 2px solid var(--border); border-radius: 12px; 
            background: var(--card-bg); color: var(--text); font-size: 16px; outline: none;
        }
        .btn-add { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px;
        }

        /* Items */
        .item { 
            background: rgba(0,0,0,0.02); border: 1px solid var(--border); 
            padding: 14px; border-radius: 16px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .dark-mode .item { background: rgba(255,255,255,0.03); }

        .grade-badge { 
            padding: 5px 12px; border-radius: 8px; color: white; font-weight: 900; 
        }
        .g-good { background: var(--grade-1); }
        .g-ok { background: var(--grade-3); color: #2d3436; }
        .g-bad { background: var(--grade-5); }

        /* Admin Modal */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--card-bg); z-index: 100; padding: 25px; border-radius: 24px; 
            width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 90; backdrop-filter: blur(8px); 
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            body { padding: 15px 10px; }
            .container { padding: 18px; }
            .tab-btn { font-size: 11px; padding: 10px 2px; }
        }
    </style>
</head>
<body class="dark-mode"> <div class="top-bar">
        <button class="tab-btn" style="flex:0; padding: 8px 12px;" onclick="toggleDarkMode()">🌓 Mode</button>
        <button class="tab-btn" style="flex:0; padding: 8px 12px; background:#2d3436; color:white;" onclick="openAdmin()">⚙️ Admin</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showView('hw-view', this)">📚 Hausaufgaben</button>
        <button class="tab-btn" onclick="showView('exam-view', this)">📝 Arbeiten</button>
        <button class="tab-btn" onclick="showView('grade-view', this)">⭐ Noten</button>
    </div>

    <div class="container">
        <div id="hw-view" class="view active">
            <h2 style="margin-top:0">To-Do Liste</h2>
            <div class="input-group">
                <input type="text" id="hw-task" placeholder="Hausaufgabe eingeben...">
                <select id="hw-sub">
                    <option>Mathe</option><option>Deutsch</option><option>Englisch</option>
                    <option>Physik</option><option>Bio</option><option>Chemie</option>
                </select>
                <button class="btn-add" onclick="addItem('hw')">Hinzufügen</button>
            </div>
            <div id="hw-list"></div>
        </div>

        <div id="exam-view" class="view">
            <h2 style="margin-top:0">Termine 📅</h2>
            <div class="input-group">
                <input type="text" id="exam-name" placeholder="Thema der Arbeit">
                <input type="date" id="exam-date">
                <select id="exam-sub"><option>Mathe</option><option>Deutsch</option><option>Englisch</option></select>
                <button class="btn-add" onclick="addItem('exam')">Termin speichern</button>
            </div>
            <div id="exam-list"></div>
        </div>

        <div id="grade-view" class="view">
            <h2 style="margin-top:0">Noten ⭐</h2>
            <div class="input-group">
                <input type="number" id="grade-val" placeholder="Note (1-6)" min="1" max="6">
                <select id="grade-sub"><option>Mathe</option><option>Deutsch</option><option>Englisch</option></select>
                <button class="btn-add" onclick="addItem('grade')">Eintragen</button>
            </div>
            <div id="avg-display" style="font-weight:bold; color:var(--primary); text-align:center; margin-bottom:15px; font-size:18px;">Schnitt: --</div>
            <div id="grade-list"></div>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAdmin()"></div>
    <div id="admin-panel" class="modal">
        <h3 style="margin-top:0">Admin Control</h3>
        <p id="admin-stats" style="font-size:14px; opacity:0.8;"></p>
        <button class="btn-add" style="background:#ff7675; width:100%" onclick="fullReset()">⚠️ Alles löschen</button>
        <button onclick="closeAdmin()" style="width:100%; margin-top:15px; background:none; border:none; color:var(--text); cursor:pointer;">Schließen</button>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('school_ultra_db') || '{"hw":[], "exams":[], "grades":[]}');

    function showView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        btn.classList.add('active');
    }

    function addItem(type) {
        if(type === 'hw') {
            const t = document.getElementById('hw-task').value;
            if(!t) return;
            db.hw.unshift({id: Date.now(), text: t, sub: document.getElementById('hw-sub').value});
            document.getElementById('hw-task').value = "";
        } else if(type === 'exam') {
            const n = document.getElementById('exam-name').value;
            const d = document.getElementById('exam-date').value;
            if(!n || !d) return;
            db.exams.push({id: Date.now(), text: n, date: d, sub: document.getElementById('exam-sub').value});
        } else if(type === 'grade') {
            const g = document.getElementById('grade-val').value;
            if(!g || g < 1 || g > 6) return;
            db.grades.push({id: Date.now(), val: parseFloat(g), sub: document.getElementById('grade-sub').value});
        }
        save(); renderAll();
    }

    function renderAll() {
        document.getElementById('hw-list').innerHTML = db.hw.map(i => `<div class="item"><span><b>${i.sub}:</b> ${i.text}</span><span onclick="remove('hw', ${i.id})">🗑️</span></div>`).join('');
        document.getElementById('exam-list').innerHTML = db.exams.map(i => `<div class="item"><div><b>${i.sub}</b><br><small>${i.date}</small></div><span onclick="remove('exams', ${i.id})">🗑️</span></div>`).join('');
        
        document.getElementById('grade-list').innerHTML = db.grades.map(i => {
            let c = i.val <= 2 ? 'g-good' : (i.val <= 4 ? 'g-ok' : 'g-bad');
            return `<div class="item"><span>${i.sub}</span><div style="display:flex; gap:10px;"><span class="grade-badge ${c}">${i.val}</span><span onclick="remove('grades', ${i.id})">🗑️</span></div></div>`;
        }).join('');

        if(db.grades.length > 0) {
            const avg = (db.grades.reduce((a, b) => a + b.val, 0) / db.grades.length).toFixed(2);
            document.getElementById('avg-display').innerText = `Schnitt: ${avg}`;
        }
    }

    function remove(type, id) { db[type] = db[type].filter(i => i.id !== id); save(); renderAll(); }
    function save() { localStorage.setItem('school_ultra_db', JSON.stringify(db)); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function fullReset() { if(confirm("ALLES LÖSCHEN?")) { localStorage.clear(); location.reload(); } }
    
    function openAdmin() {
        if(prompt("Passwort?") === "AdminPanelPasswort123!") {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('admin-stats').innerText = `Daten: ${db.hw.length} Aufgaben, ${db.exams.length} Arbeiten, ${db.grades.length} Noten.`;
        }
    }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }

    renderAll();
</script>
</body>
</html>
